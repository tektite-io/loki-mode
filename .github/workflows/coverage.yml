name: Coverage (baseline)

# Collects bun test coverage for loki-ts as a baseline. Does NOT enforce a
# threshold yet -- the artifact is uploaded for inspection. A future change
# can flip this on once we agree on a target.

on:
  push:
    branches:
      - main
      - feat/bun-migration
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bun-coverage:
    name: bun test --coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install loki-ts dependencies
        working-directory: loki-ts
        run: bun install

      - name: Run bun test with coverage
        working-directory: loki-ts
        run: |
          mkdir -p coverage
          # Bun writes a text summary to stdout. Capture both stdout and
          # the lcov-style report it can emit via --coverage-reporter=lcov
          # (graceful fallback if the reporter flag is unavailable).
          set +e
          bun test --coverage --coverage-reporter=lcov --coverage-dir=./coverage 2>&1 | tee coverage/coverage.txt
          ec=${PIPESTATUS[0]}
          set -e
          # Baseline-only: do not gate on threshold. Tests must still pass.
          if [ "$ec" -ne 0 ]; then
            echo "::error::bun test failed (exit $ec)"
            exit "$ec"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-loki-ts
          path: loki-ts/coverage/
          if-no-files-found: warn
          retention-days: 30
